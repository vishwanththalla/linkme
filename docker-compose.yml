services:
  db:
    image: postgres:15
    container_name: linkme_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linkme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: linkme_backend
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: linkme
      DB_PORT: 5432
      DB_SSLMODE: disable   # 🔥 CRITICAL FIX
      GIN_MODE: release
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: linkme_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data: